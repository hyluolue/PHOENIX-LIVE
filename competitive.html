<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>竞品监控 · 实时</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#fff;padding:20px}
    a{color:#9ec5fe;text-decoration:none}
    a:hover{text-decoration:underline}
    .container{max-width:1400px;margin:0 auto}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .logo{width:44px;height:44px;background:#c8102e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0}
    h1{font-size:20px;font-weight:800}
    .subtitle{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
    .back-link{font-size:12px;color:rgba(255,255,255,.7);margin-left:auto;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:8px}
    .status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;align-items:center}
    .pill{padding:4px 10px;border-radius:999px;font-weight:600}
    .pill-ok{background:#1b5e20;color:#a5d6a7}
    .pill-partial{background:#e65100;color:#ffcc80}
    .pill-fail{background:#b71c1c;color:#ffcdd2}
    .last-updated{font-size:11px;color:rgba(255,255,255,.5);margin-left:auto}
    .refresh-btn{background:#1565c0;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}
    .refresh-btn:hover{background:#1976d2}
    .section{background:#fff;color:#1a1a1a;border-radius:16px;padding:20px 22px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px}
    .section h2{font-size:16px;font-weight:700;color:#c8102e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section h2 .flag{font-size:18px}
    .filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .filter-bar label{font-size:12px;color:#666;margin-right:4px}
    .filter-bar select,.filter-bar input{padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#333}
    .filter-bar input{min-width:200px}
    .brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
    .brand-card{background:#fafafa;border-radius:10px;padding:12px 14px;border-left:4px solid #c8102e;transition:transform .15s}
    .brand-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .brand-card.phoenix{border-left-color:#c8102e;background:#fff5f6}
    .brand-card.marine{border-left-color:#1565c0;background:#e3f2fd}
    .brand-card.giant{border-left-color:#2e7d32;background:#e8f5e9}
    .brand-card.foxter{border-left-color:#9c27b0;background:#f3e5f5}
    .brand-card.pacific{border-left-color:#ff6f00;background:#fff3e0}
    .brand-card.warrior{border-left-color:#5d4037;background:#efebe9}
    .brand-card.thorne{border-left-color:#00838f;background:#e0f7fa}
    .brand-card.duranta{border-left-color:#c2185b;background:#fce4ec}
    .brand-card.veloce{border-left-color:#558b2f;background:#f1f8e9}
    .brand-card.pentane{border-left-color:#0277bd;background:#e1f5fe}
    .brand-name{font-size:14px;font-weight:800;color:#0d47a1;margin-bottom:6px;text-transform:uppercase}
    .brand-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:11px}
    .brand-item:last-child{border-bottom:none}
    .brand-item .model{color:#555;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
    .brand-item .price{color:#c8102e;font-weight:700;white-space:nowrap}
    .brand-item a{color:inherit}
    .summary{background:#e3f2fd;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;color:#0d47a1}
    .summary strong{color:#c8102e}
    .empty{padding:40px 20px;text-align:center;color:#999;font-size:13px;font-style:italic}
    .footer{text-align:center;font-size:11px;color:rgba(255,255,255,.4);margin-top:30px}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">P</div>
      <div>
        <h1>🎯 竞品监控 · 实时价格</h1>
        <div class="subtitle">MTB 全球市场 · <span id="date"></span> · 每日 9:00 自动更新</div>
      </div>
      <a class="back-link" href="./index.html">← 返回主面板</a>
    </div>

    <div class="status-bar">
      <span id="status-daraz" class="pill pill-fail">⏳ daraz_bd</span>
      <span class="last-updated" id="updated">—</span>
      <button class="refresh-btn" onclick="location.reload()">↻ 刷新</button>
    </div>

    <div class="section">
      <h2><span class="flag">📈</span>品牌价格矩阵 <small style="color:#999;font-weight:400">（按品牌聚合）</small></h2>
      <div class="summary" id="summary">加载中...</div>
      <div class="filter-bar">
        <label>筛选：</label>
        <select id="region-filter">
          <option value="all">全部地区</option>
          <option value="bd">🇧🇩 孟加拉</option>
          <option value="id">🇮🇩 印尼</option>
        </select>
        <input type="text" id="search" placeholder="🔍 搜品牌或型号..." />
      </div>
      <div id="brand-grid" class="brand-grid"></div>
    </div>

    <div class="footer">
      数据来源：Daraz BD / Sogou 搜索 / WBIA / OEC<br />
      本页面为 Phoenix-Live Tab #4 · 每日 9:00 自动更新
    </div>
  </div>

<script>
  const cn = ['日','一','二','三','四','五','六'];
  const d = new Date();
  document.getElementById('date').textContent = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日星期'+cn[d.getDay()];

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  let allData = null;

  async function load() {
    let data;
    try {
      const r = await fetch('./data/latest.json', {cache: 'no-store'});
      data = await r.json();
    } catch (e) {
      document.getElementById('brand-grid').innerHTML = '<div class="empty">⚠️ 加载失败：' + e.message + '</div>';
      return;
    }
    allData = data;
    document.getElementById('updated').textContent = '更新于 ' + (data.generated_at || '未知');

    const s = data.fetch_status || {};
    const el = document.getElementById('status-daraz');
    const v = s['daraz_bd'] || 'fail';
    el.className = 'pill pill-' + v;
    el.textContent = v === 'ok' ? '✓ daraz_bd' : v === 'partial' ? '⚠ daraz_bd' : '✗ daraz_bd';

    render();
  }

  function render() {
    if (!allData) return;
    const region = document.getElementById('region-filter').value;
    const search = document.getElementById('search').value.toLowerCase();

    // 收集价格项
    const items = [];
    if (region === 'all' || region === 'bd') {
      for (const it of (allData.bd?.price_pool || [])) {
        items.push({...it, _region: 'BD'});
      }
    }
    if (region === 'all' || region === 'id') {
      for (const it of (allData.id?.price_pool || [])) {
        items.push({...it, _region: 'ID'});
      }
    }

    // 品牌名归一化（处理首字母大写差异）
    function brandKey(b) {
      if (!b) return 'Generic';
      const lower = b.toLowerCase();
      if (lower.includes('phoenix')) return 'Phoenix';
      if (lower.includes('marine')) return 'Marine';
      if (lower.includes('giant')) return 'Giant';
      if (lower.includes('foxter')) return 'Foxter';
      if (lower.includes('pacific')) return 'Pacific';
      if (lower.includes('warrior')) return 'Warrior';
      if (lower.includes('thorne')) return 'Thorne';
      if (lower.includes('duranta')) return 'Duranta';
      if (lower.includes('veloce')) return 'Veloce';
      if (lower.includes('be worth') || lower.includes('beworth')) return 'Be worth';
      if (lower.includes('polygon')) return 'Polygon';
      return b;
    }

    // 按品牌聚合
    const byBrand = {};
    for (const it of items) {
      if (search) {
        const s = (it.brand + ' ' + (it.model || '')).toLowerCase();
        if (!s.includes(search)) continue;
      }
      const k = brandKey(it.brand);
      if (!byBrand[k]) byBrand[k] = [];
      byBrand[k].push(it);
    }

    // 统计
    const totalBrands = Object.keys(byBrand).length;
    const totalItems = items.length;
    const priced = items.filter(i => i.price > 0).length;
    document.getElementById('summary').innerHTML =
      `共抓取 <strong>${totalItems}</strong> 条商品 · <strong>${priced}</strong> 条有价格 · 分布在 <strong>${totalBrands}</strong> 个品牌` +
      (region === 'all' ? '' : ` · <strong>${region.toUpperCase()}</strong> 区域`);

    // 渲染品牌卡
    const grid = document.getElementById('brand-grid');
    if (totalBrands === 0) {
      grid.innerHTML = '<div class="empty">无匹配数据</div>';
      return;
    }
    // 排序：Phoenix 排第一，其他按字母
    const order = Object.keys(byBrand).sort((a, b) => {
      if (a === 'Phoenix') return -1;
      if (b === 'Phoenix') return 1;
      return a.localeCompare(b);
    });

    grid.innerHTML = order.map(brand => {
      const cardItems = byBrand[brand].slice(0, 5); // 每个品牌最多显示 5 条
      const more = byBrand[brand].length - cardItems.length;
      const cls = brand.toLowerCase();
      return `
        <div class="brand-card ${cls}">
          <div class="brand-name">${esc(brand)} <span style="color:#999;font-weight:400;font-size:11px">· ${byBrand[brand].length} 条</span></div>
          ${cardItems.map(it => `
            <a class="brand-item" href="${esc(it.url)}" target="_blank" rel="noopener">
              <span class="model">${esc(it.model)} <span style="color:#888">(${esc(it.platform)})</span></span>
              <span class="price">${esc(it.currency)} ${it.price.toLocaleString()}</span>
            </a>
          `).join('')}
          ${more > 0 ? `<div style="font-size:10px;color:#999;padding:4px 0;text-align:right">+${more} more</div>` : ''}
        </div>
      `;
    }).join('');
  }

  document.getElementById('region-filter').addEventListener('change', render);
  document.getElementById('search').addEventListener('input', render);

  load();
</script>
</body>
</html>
