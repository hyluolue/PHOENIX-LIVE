<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>凤凰 MTB 市场日报 · 实时数据</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#fff;padding:20px}
    a{color:#9ec5fe;text-decoration:none}
    a:hover{text-decoration:underline}
    .container{max-width:1200px;margin:0 auto}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .logo{width:44px;height:44px;background:#c8102e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0}
    h1{font-size:20px;font-weight:800}
    .subtitle{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
    .back-link{font-size:12px;color:rgba(255,255,255,.7);margin-left:auto;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:8px}
    .status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:12px}
    .pill{padding:4px 10px;border-radius:999px;font-weight:600}
    .pill-ok{background:#1b5e20;color:#a5d6a7}
    .pill-partial{background:#e65100;color:#ffcc80}
    .pill-fail{background:#b71c1c;color:#ffcdd2}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:#fff;color:#1a1a1a;border-radius:16px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
    .card h2{font-size:16px;font-weight:700;color:#1565c0;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .card h2 .flag{font-size:18px}
    .card.id h2{color:#2e7d32}
    .item{background:#f7f9fc;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:10px;border-left:3px solid #1565c0;font-size:12px}
    .card.id .item{border-left-color:#2e7d32}
    .item .meta{flex:1;min-width:0}
    .item .brand{font-weight:700;color:#0d47a1}
    .card.id .item .brand{color:#1b5e20}
    .item .model{display:block;color:#555;font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item .price{font-weight:800;color:#c8102e;font-size:14px;white-space:nowrap}
    .card.id .item .price{color:#2e7d32}
    .item .new{background:#c8102e;color:#fff;font-size:9px;padding:1px 6px;border-radius:6px;margin-left:4px;font-weight:700}
    .empty{padding:20px;text-align:center;color:#999;font-size:12px;font-style:italic}
    .news-section{margin-top:20px}
    .news-section h2{font-size:15px;font-weight:700;color:#9c27b0;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .news-section h2 .flag{font-size:18px}
    .news-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 12px;background:#f9f5ff;border-left:3px solid #9c27b0;border-radius:6px;margin-bottom:6px;font-size:12px;transition:background .15s}
    .news-item:hover{background:#f3e5f5;text-decoration:none}
    .news-title{flex:1;min-width:0;color:#4a148c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .news-source{font-size:10px;background:#e1bee7;color:#6a1b9a;padding:1px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
    .footer{text-align:center;font-size:11px;color:rgba(255,255,255,.4);margin-top:30px}
    .refresh-btn{background:#1565c0;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}
    .refresh-btn:hover{background:#1976d2}
    .last-updated{font-size:11px;color:rgba(255,255,255,.5)}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">P</div>
      <div>
        <h1>凤凰 MTB 市场日报</h1>
        <div class="subtitle">孟加拉 + 印尼 双市场 · <span id="date"></span> · 每日自动爬取</div>
      </div>
      <a class="back-link" href="./index.html">← 返回主面板</a>
    </div>

    <div class="status-bar">
      <span id="status-daraz" class="pill pill-fail">⏳ 加载中...</span>
      <span id="status-news-bd" class="pill pill-fail">⏳ news_bd</span>
      <span id="status-news-id" class="pill pill-fail">⏳ news_id</span>
      <span class="last-updated" id="updated">—</span>
      <button class="refresh-btn" onclick="location.reload()">↻ 刷新</button>
    </div>

    <div class="grid">
      <div class="card bd">
        <h2><span class="flag">🇧🇩</span>孟加拉 MTB 价格池 <small style="color:#999;font-weight:400">（Daraz BD 实时）</small></h2>
        <div id="bd-prices"></div>
      </div>
      <div class="card id">
        <h2><span class="flag">🇮🇩</span>印尼 MTB 价格池 <small style="color:#999;font-weight:400">（Shopee / Tokopedia 实时）</small></h2>
        <div id="id-prices"></div>
      </div>
    </div>

    <div class="grid news-section">
      <div class="card bd">
        <h2><span class="flag">🇧🇩</span>孟加拉 MTB 市场动态 <small style="color:#999;font-weight:400">（Sogou 搜索）</small></h2>
        <div id="bd-news"></div>
      </div>
      <div class="card id">
        <h2><span class="flag">🇮🇩</span>印尼 MTB 市场动态 <small style="color:#999;font-weight:400">（Sogou 搜索）</small></h2>
        <div id="id-news"></div>
      </div>
    </div>

    <div class="footer">
      数据来源：Daraz BD / Shopee ID / Tokopedia / Google News RSS<br />
      本页面为 Phoenix-Live 阶段 1 演示 · 每日 9:00 自动更新
    </div>
  </div>

<script>
  // 顶部日期
  const d = new Date();
  const cn = ['日','一','二','三','四','五','六'];
  document.getElementById('date').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日星期${cn[d.getDay()]}`;

  // 拉取数据
  async function load() {
    let data;
    try {
      const r = await fetch('./data/latest.json', {cache: 'no-store'});
      data = await r.json();
    } catch (e) {
      document.getElementById('bd-prices').innerHTML = '<div class="empty">⚠️ 加载失败：' + e.message + '</div>';
      return;
    }
    document.getElementById('updated').textContent = '更新于 ' + (data.generated_at || '未知');

    // 状态条
    const s = data.fetch_status || {};
    function setPill(id, k) {
      const el = document.getElementById(id);
      const v = s[k] || 'fail';
      el.className = 'pill pill-' + v;
      el.textContent = v === 'ok' ? '✓ ' + k : v === 'partial' ? '⚠ ' + k + ' 部分' : '✗ ' + k;
    }
    setPill('status-daraz', 'daraz_bd');
    setPill('status-news-bd', 'news_bd');
    setPill('status-news-id', 'news_id');

    // BD 价格
    const bdItems = (data.bd && data.bd.price_pool) || [];
    const bdEl = document.getElementById('bd-prices');
    if (bdItems.length === 0) {
      bdEl.innerHTML = '<div class="empty">暂无数据（爬虫未跑 / 源不可达）</div>';
    } else {
      bdEl.innerHTML = bdItems.map(it => `
        <a class="item" href="${escapeHtml(it.url)}" target="_blank" rel="noopener">
          <div class="meta">
            <span class="brand">${escapeHtml(it.brand)}</span>
            <span class="model">${escapeHtml(it.model)}</span>
          </div>
          <div class="price">${escapeHtml(it.currency)} ${it.price.toLocaleString()}${it.is_new ? '<span class="new">NEW</span>' : ''}</div>
        </a>
      `).join('');
    }

    // ID 价格
    const idItems = (data.id && data.id.price_pool) || [];
    const idEl = document.getElementById('id-prices');
    if (idItems.length === 0) {
      idEl.innerHTML = '<div class="empty">Shopee ID / Tokopedia 反爬墙拦路（企业级 captcha）<br>已跳过，价格数据留空</div>';
    } else {
      idEl.innerHTML = idItems.map(it => `
        <a class="item" href="${escapeHtml(it.url)}" target="_blank" rel="noopener">
          <div class="meta">
            <span class="brand">${escapeHtml(it.brand)}</span>
            <span class="model">${escapeHtml(it.model)}</span>
          </div>
          <div class="price">${escapeHtml(it.currency)} ${it.price.toLocaleString()}${it.is_new ? '<span class="new">NEW</span>' : ''}</div>
        </a>
      `).join('');
    }

    // BD news
    const bdNews = (data.bd && data.bd.news) || [];
    const bdNewsEl = document.getElementById('bd-news');
    if (bdNews.length === 0) {
      bdNewsEl.innerHTML = '<div class="empty">暂无市场动态（爬虫未跑 / 源不可达）</div>';
    } else {
      bdNewsEl.innerHTML = bdNews.map(n => `
        <a class="news-item" href="${escapeHtml(n.url)}" target="_blank" rel="noopener">
          <span class="news-title">${escapeHtml(n.title)}</span>
          <span class="news-source">${escapeHtml(n.source || '?')}</span>
        </a>
      `).join('');
    }

    // ID news
    const idNews = (data.id && data.id.news) || [];
    const idNewsEl = document.getElementById('id-news');
    if (idNews.length === 0) {
      idNewsEl.innerHTML = '<div class="empty">印尼市场动态：Sogou 搜索结果少（中文引擎对印尼语不友好）<br>尝试用印尼语 query 跑时常 0 条</div>';
    } else {
      idNewsEl.innerHTML = idNews.map(n => `
        <a class="news-item" href="${escapeHtml(n.url)}" target="_blank" rel="noopener">
          <span class="news-title">${escapeHtml(n.title)}</span>
          <span class="news-source">${escapeHtml(n.source || '?')}</span>
        </a>
      `).join('');
    }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  load();
</script>
</body>
</html>
